risk_engine:
  # Relaxed limits for paper validation mode
  max_trades_per_day: 999  # No daily trade limit in paper
  max_total_exposure_pct: 95.0  # Use capital aggressively

  # Kill switch — still active but less aggressive
  daily_loss_limit_pct: 15.0  # 15% daily loss before kill (vs 5% in normal mode)
  max_consecutive_losses: 10  # 10 losses before kill (vs 3 in normal mode)

  # Position sizing
  kelly_fraction: 0.25  # Full Kelly for aggressive validation
  conviction_boost: true

  # Edge monitoring
  edge_monitor:
    enabled: true
    ewma_window: 20
    min_trades_for_edge_check: 5
    degradation_threshold: 0.4  # Flag if edge drops 40% from peak

  # Correlation checking
  max_portfolio_correlation: 0.95  # Allow high correlation in paper (validation)

execution:
  slippage_bps: 5.0  # Realistic slippage
  fee_bps: 10.0  # Binance 0.1% taker
  settlement_delay_minutes: 0  # Instant in paper

logging:
  level: "INFO"
  decision_trace: true
  detailed_fills: true
  daily_summary: true
