assets:
  - ticker: BTC
    exchange: CRYPTO
  - ticker: ETH
    exchange: CRYPTO
  - ticker: SOL
    exchange: CRYPTO

timeframes:
  - 4h
  - 1d

years_of_data: 3

backtest:
  initial_capital: 100000
  slippage_bps: 5.0
  fee_bps: 10.0

hypotheses:
  trend:
    enabled: false

  reversion:
    enabled: false

  momentum:
    enabled: false

  bollinger:
    enabled: true
    bb_period: [15, 20, 25]
    bb_std: [1.5, 2.0, 2.5]
    rsi_period: [7, 14]
    rsi_oversold: [35, 40, 45]
    rsi_overbought: [60, 65, 70]
    stop_loss_pcts: [3.0, 5.0]
    enable_short: [false]

filters:
  min_trades: 10
  wf_min_sharpe_mean: 0.2
  wf_min_consistency: 0.6
  param_robustness_min_score: 0.6
  param_variation_pct: 0.10
  param_min_sharpe: 0.0
