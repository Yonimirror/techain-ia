# Research configuration — RSI Mean Reversion only (with EMA200 filter variants)
# Minimal config to test EMA200 filter impact quickly

assets:
  - ticker: BTC
    exchange: CRYPTO
  - ticker: ETH
    exchange: CRYPTO
  - ticker: SOL
    exchange: CRYPTO

timeframes:
  - 1d
  - 4h

years_of_data: 3

backtest:
  initial_capital: 100000
  slippage_bps: 5.0
  fee_bps: 10.0

hypotheses:
  trend:
    enabled: false

  reversion:
    enabled: true
    rsi_periods: [7, 14, 21]
    oversold: [25, 30, 35]
    overbought: [60, 65, 70]
    stop_loss_pcts: [3.0, 5.0]
    enable_short: [false]
    ema_trend_filter: [false, true]  # COMPARE ON vs OFF

  momentum:
    enabled: false

  bollinger:
    enabled: false

filters:
  min_trades: 10
  wf_min_sharpe_mean: 0.2
  wf_min_consistency: 0.6
  param_robustness_min_score: 0.6
  param_variation_pct: 0.10
  param_min_sharpe: 0.0
